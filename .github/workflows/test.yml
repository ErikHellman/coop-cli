name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - run: go vet ./...

      - run: go build ./...

  integration:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - run: go test -run TestIntegration -count=1 -v -timeout 120s ./...
        env:
          COOP_EMAIL: ${{ secrets.COOP_EMAIL }}
          COOP_PASSWORD: ${{ secrets.COOP_PASSWORD }}
